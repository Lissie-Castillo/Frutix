<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <title>Inicio - El Divino Niño</title>
<style>

    /* Fondo */
    body{
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        background-color: #1b461a;
        background-image: url('/static/fondoverde.png');
        background-size: 100% auto;       
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        
    }

    h1{
        font-family: 'Playfair Display', serif;
        font-size: 2rem;
        font-style: italic;
        color: #ffffff;
        margin-bottom: 10px;
    }

    /* Tarjeta principal  */
    .main-card{
        position: relative;
        z-index: 1;
        background: rgba(255,255,255,0.08); /* Fondo translúcido */
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        padding: 40px 30px;
        width: 350px;
        text-align: center;
        animation: fadeIn 0.6s ease;
    } 

    /* Imagen debajo del título */
    .imagen-fruteria {
        width: 150px;      
        height: auto;      
        display: block;    
        margin: 10px auto 20px auto; 
        border-radius: 15px; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
    }

    .contenido {
        color: #ffffff;
        font-size: 18px;
        font-weight: 600;
        padding: 10px;
    }

    /* Botón de login */
    .boton-login {
        padding: 12px;
        width: 80%;
        background-color: #37e031;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.3s;
        margin: 10px auto;
        display: block;
        text-decoration: none; /* para que parezca botón si es enlace */
    }

    .boton-login:hover {
        background-color: #2e912b;
    }

    /* Footer */
    footer {
        margin-top: 20px;
        font-size: 14px;
        color: #c5e1a5;
    }

    /* Animación */
    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

</style>
</head>
<body>

    <div class="main-card">
        <h1>Frutería "El Divino Niño"</h1>

        <!-- Imagen debajo del título -->
        <img src="/static/logo.png" class="imagen-fruteria">          

        <!-- Botón que lleva a login tendero -->
        <a href="/login_empleado" class="boton-login">Ingresar</a>

        <footer>
          © 2026 Frutería "El Divino Niño"  
        </footer>
    </div>

</body>
</html>
