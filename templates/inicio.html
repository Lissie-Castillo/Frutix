<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - El Divino Niño</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        background-color: #1b461a;
        background-image: url("{{ url_for('static', filename='fondoverde.png') }}");
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    h1{
        font-family: 'Playfair Display', serif;
        font-size: 2rem;
        color: #ffffff;
        margin-bottom: 10px;
    }

    .main-card {
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        padding: 40px 30px;
        width: 350px;
        text-align: center;
    }

    .imagen-fruteria {
        width: 140px;
        margin: 10px auto 20px auto;
        display: block;
        border-radius: 15px;
    }

    .input-wrapper { /*espacio entre cada input */
        margin-bottom: 15px;
    }

    .input-wrapper input {
        width: 100%;
        padding: 12px; /*espacio interno */
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.1);
        color: #fff;
        font-size: 14px;
        box-sizing: border-box; /*esto evita que se salgan */
        outline: none; /*quita el borde al hacer click*/
    }

    .input-wrapper input::placeholder { /*es el texto guia */
        color: rgba(255,255,255,0.5);
    }

    .input-wrapper input:focus { /*este hace que se vuelva verde al escribir */
        border-color: #37e031;
        background: rgba(255,255,255,0.15);
    }

    .boton-login {
        width: 100%;
        padding: 12px;
        background-color: #37e031;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
    }

    .boton-login:hover {
        background-color: #2e912b;
    }

    .error {
        color: #ffb3b3;
        margin-top: 10px;
        font-size: 14px;
    }

    footer {
        margin-top: 20px;
        font-size: 14px;
        color: #c5e1a5;
    }

</style>
</head>

<body>

    <div class="main-card">
        <h1>Frutería "El Divino Niño"</h1>

        <img src="{{ url_for('static', filename='logo.png') }}" class="imagen-fruteria">

        <form action="/" method="post">

            <div class="input-wrapper">
                <input type="text" name="usuario" placeholder="Usuario" required>
            </div>

            <div class="input-wrapper">
                <input type="password" name="password" placeholder="Contraseña" required>
            </div>

            <button type="submit" class="boton-login">Ingresar</button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <footer>© 2026 Frutería "El Divino Niño"</footer>
    </div>

</body>
</html>
